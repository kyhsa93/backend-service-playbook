name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: go
            build-mode: autobuild
          # java-springboot and kotlin-springboot are two independent Gradle projects living
          # in one repo, which makes it ambiguous which one autobuild would build — so this
          # stays in source-only "none" mode (data-flow analysis accuracy is somewhat lower,
          # but both projects get covered).
          - language: java-kotlin
            build-mode: none

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        if: matrix.language == 'go'
        with:
          go-version-file: implementations/go/examples/go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
