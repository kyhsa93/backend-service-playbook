name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: go
            build-mode: autobuild
          # java-springboot와 kotlin-springboot, 두 개의 독립된 Gradle 프로젝트가 한 저장소에
          # 있어 autobuild가 어느 쪽을 빌드할지 모호해진다 — 컴파일 없이 소스만 추출하는
          # none 모드로 둔다(데이터플로우 분석 정확도는 다소 낮아지지만 두 프로젝트 모두 커버됨).
          - language: java-kotlin
            build-mode: none

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v7
        if: matrix.language == 'go'
        with:
          go-version-file: implementations/go/examples/go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
