name: fastapi

on:
  push:
    branches: [main]
    paths:
      - 'implementations/fastapi/**'
      - '.github/workflows/fastapi.yml'
  pull_request:
    paths:
      - 'implementations/fastapi/**'
      - '.github/workflows/fastapi.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  fastapi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/fastapi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - run: pip install -r examples/requirements.txt

      # ruff checks examples/ and harness/ together (using implementations/fastapi/pyproject.toml's config).
      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      # cwd must be examples/ for `from main import app`/`from src...` to resolve via sys.path
      # (the pytest console script doesn't add cwd to sys.path, so `python -m pytest` is run from inside examples/).
      - run: cd examples && python -m pytest tests

      # The harness's directory-structure rule can false-positive on __pycache__ as a
      # phantom directory — clean up any __pycache__ that pytest created under examples/
      # before running the harness.
      - run: find examples -iname __pycache__ -exec rm -rf {} +

      - name: Harness self-tests (per-rule fixture regression tests)
        run: cd harness && python3 -m pytest tests/

      - name: Harness
        run: bash harness.sh examples | tee /tmp/harness-output.txt

      - name: Format harness score comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          { echo '### fastapi harness'; echo; echo '```'; cat /tmp/harness-output.txt; echo '```'; } > /tmp/harness-comment.md

      - name: Comment harness score on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        with:
          header: harness-fastapi
          path: /tmp/harness-comment.md
