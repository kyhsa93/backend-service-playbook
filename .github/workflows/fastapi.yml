name: fastapi

on:
  push:
    branches: [main]
    paths:
      - 'implementations/fastapi/**'
      - '.github/workflows/fastapi.yml'
  pull_request:
    paths:
      - 'implementations/fastapi/**'
      - '.github/workflows/fastapi.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  fastapi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/fastapi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install -r examples/requirements.txt

      # ruff는 examples/와 harness/를 함께 검사한다 (implementations/fastapi/pyproject.toml 설정 적용).
      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      # cwd가 examples/여야 `from main import app`, `from src...`가 sys.path로 해석된다
      # (콘솔 스크립트 pytest는 cwd를 sys.path에 넣지 않으므로 `python -m pytest`를 examples/ 안에서 실행한다).
      - run: cd examples && python -m pytest tests

      # harness의 directory-structure 규칙이 __pycache__를 phantom 디렉토리로
      # 오탐할 수 있다 — pytest 실행으로 examples/ 아래 생긴 __pycache__를 harness 실행 전에 정리한다.
      - run: find examples -iname __pycache__ -exec rm -rf {} +

      - name: Harness self-tests (규칙별 fixture 회귀 테스트)
        run: cd harness && python3 -m pytest tests/

      - name: Harness
        run: bash harness.sh examples | tee /tmp/harness-output.txt

      - name: Format harness score comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          { echo '### fastapi harness'; echo; echo '```'; cat /tmp/harness-output.txt; echo '```'; } > /tmp/harness-comment.md

      - name: Comment harness score on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: harness-fastapi
          path: /tmp/harness-comment.md
