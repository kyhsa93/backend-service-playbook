name: Nightly full sweep

# 매일 밤 5개 언어 CI + harness + docs-drift + history-narrative + 스캐폴딩 생성기까지
# 전부 한 번씩 돌려, 아무 파일도 안 바뀌었는데 외부 요인(의존성 릴리스, 툴체인 업데이트,
# 베이스 이미지 변경 등)만으로 뭔가 깨지지 않았는지 감시한다 — path-filter가 있는
# 평소 CI는 관련 파일이 바뀔 때만 도는 반면, 이건 무조건 전체를 돈다.

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  trigger-all:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-run every path-filtered workflow in full
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for wf in nestjs.yml go.yml java-springboot.yml kotlin-springboot.yml fastapi.yml \
                    scaffolding-regression.yml docker-image-scan.yml docs-drift.yml \
                    history-narrative-check.yml markdownlint.yml codeql.yml; do
            echo "Dispatching $wf"
            gh workflow run "$wf" --repo "${{ github.repository }}" --ref main || echo "skip $wf (no workflow_dispatch trigger)"
          done
