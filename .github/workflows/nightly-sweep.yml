name: Nightly full sweep

# Every night, runs all 5 languages' CI + harness + docs-drift + history-narrative +
# scaffolding generators once each, to catch anything that broke purely from an external
# factor (a dependency release, a toolchain update, a base image change) even though no
# file in this repo changed — the regular path-filtered CI only runs when relevant files
# change, whereas this always runs everything unconditionally.

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  trigger-all:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-run every path-filtered workflow in full
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for wf in nestjs.yml go.yml java-springboot.yml kotlin-springboot.yml fastapi.yml \
                    scaffolding-regression.yml docker-image-scan.yml docs-drift.yml \
                    history-narrative-check.yml markdownlint.yml codeql.yml; do
            echo "Dispatching $wf"
            gh workflow run "$wf" --repo "${{ github.repository }}" --ref main || echo "skip $wf (no workflow_dispatch trigger)"
          done
