name: Go

on:
  push:
    paths:
      - 'implementations/go/**'
      - '.github/workflows/go.yml'
  pull_request:
    paths:
      - 'implementations/go/**'
      - '.github/workflows/go.yml'

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v7
        with:
          go-version-file: implementations/go/examples/go.mod

      - name: Build & vet
        working-directory: implementations/go/examples
        run: |
          go build ./...
          go vet ./...

      - name: Lint (examples)
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: implementations/go/examples
          version: latest

      - name: Test (Testcontainers 기반 e2e 포함)
        working-directory: implementations/go/examples
        run: go test ./...

      - name: Harness self-tests (규칙별 fixture 회귀 테스트)
        working-directory: implementations/go/harness
        run: |
          go test ./...
          go vet ./...

      - name: Lint (harness)
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: implementations/go/harness
          version: latest

      - name: Harness
        run: bash harness.sh examples
