name: Go

on:
  push:
    paths:
      - 'implementations/go/**'
      - '.github/workflows/go.yml'
  pull_request:
    paths:
      - 'implementations/go/**'
      - '.github/workflows/go.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v7
        with:
          go-version-file: implementations/go/examples/go.mod

      - name: Build & vet
        working-directory: implementations/go/examples
        run: |
          go build ./...
          go vet ./...

      - name: Lint (examples)
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: implementations/go/examples
          version: latest

      - name: Test (including Testcontainers-based e2e)
        working-directory: implementations/go/examples
        run: go test ./...

      - name: Harness self-tests (per-rule fixture regression tests)
        working-directory: implementations/go/harness
        run: |
          go test ./...
          go vet ./...

      - name: Lint (harness)
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: implementations/go/harness
          version: latest

      - name: Harness
        run: bash harness.sh examples | tee /tmp/harness-output.txt

      - name: Format harness score comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          { echo '### Go harness'; echo; echo '```'; cat /tmp/harness-output.txt; echo '```'; } > /tmp/harness-comment.md

      - name: Comment harness score on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        with:
          header: harness-go
          path: /tmp/harness-comment.md
