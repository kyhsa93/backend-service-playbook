name: Build images (verify only, no push)

# 태그 push 또는 수동 실행 시 5개 언어 이미지가 여전히 빌드되는지만 확인한다 — 어떤
# 레지스트리에도 push하지 않는다.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang: [nestjs, go, java-springboot, kotlin-springboot, fastapi]
    steps:
      - uses: actions/checkout@v4

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: implementations/${{ matrix.lang }}/examples
          push: false
