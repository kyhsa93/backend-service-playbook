name: Build images (verify only, no push)

# On a tag push or manual run, this only confirms that all 5 languages' images still
# build — it doesn't push to any registry.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang: [nestjs, go, java-springboot, kotlin-springboot, fastapi]
    steps:
      - uses: actions/checkout@v4

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: implementations/${{ matrix.lang }}/examples
          push: false
