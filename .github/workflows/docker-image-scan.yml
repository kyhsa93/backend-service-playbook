name: Docker image scan (Trivy)

# Builds each of the 5 languages' Dockerfiles and scans them with Trivy. A base image's
# CVEs can change day to day independent of any code change in this repo, so this isn't
# used as a hard build-blocking gate (exit-code 0) — results are uploaded as SARIF purely
# for visibility in the repo's Security tab.

on:
  push:
    paths:
      - 'implementations/*/examples/Dockerfile'
      - '.github/workflows/docker-image-scan.yml'
  pull_request:
    paths:
      - 'implementations/*/examples/Dockerfile'
      - '.github/workflows/docker-image-scan.yml'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [nestjs, go, java-springboot, kotlin-springboot, fastapi]
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: implementations/${{ matrix.lang }}/examples
          push: false
          load: true
          tags: bsp-${{ matrix.lang }}:scan

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: bsp-${{ matrix.lang }}:scan
          format: sarif
          output: trivy-${{ matrix.lang }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.lang }}.sarif
          category: trivy-${{ matrix.lang }}
