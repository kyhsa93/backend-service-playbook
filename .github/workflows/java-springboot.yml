name: java-springboot

on:
  push:
    branches: [main]
    paths:
      - 'implementations/java-springboot/**'
      - '.github/workflows/java-springboot.yml'
  pull_request:
    paths:
      - 'implementations/java-springboot/**'
      - '.github/workflows/java-springboot.yml'
  workflow_dispatch:

jobs:
  java-springboot:
    runs-on: ubuntu-latest
    # ./gradlew build takes a while since it includes Testcontainers-based E2E tests.
    # This has timed out before in a resource-constrained local sandbox, but GitHub-hosted
    # ubuntu-latest ships Docker by default and has more headroom, so this tries the full
    # build as one step for now. If it keeps timing out, switch to splitting the
    # test/e2eTest tasks apart and raising timeout-minutes on each separately.
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: implementations/java-springboot
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # spotlessCheck is already included automatically by build/check, but this is split
      # into its own step so format violations get reported quickly without waiting for
      # the Testcontainers e2e run.
      - name: Lint (Spotless)
        run: ./gradlew spotlessCheck
        working-directory: implementations/java-springboot/examples

      - name: Build (unit + Testcontainers e2e)
        run: ./gradlew build
        working-directory: implementations/java-springboot/examples

      - name: Harness self-tests (per-rule fixture regression tests)
        working-directory: implementations/java-springboot/harness
        run: |
          javac -d build/classes $(find src -name "*.java")
          javac -cp build/classes -d build/test-classes test/RuleTest.java
          cd test && java -cp ../build/classes:../build/test-classes RuleTest

      - name: Run harness
        run: bash harness.sh examples | tee /tmp/harness-output.txt

      - name: Format harness score comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          { echo '### java-springboot harness'; echo; echo '```'; cat /tmp/harness-output.txt; echo '```'; } > /tmp/harness-comment.md

      - name: Comment harness score on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        with:
          header: harness-java-springboot
          path: /tmp/harness-comment.md
