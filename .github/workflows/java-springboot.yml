name: java-springboot

on:
  push:
    branches: [main]
    paths:
      - 'implementations/java-springboot/**'
      - '.github/workflows/java-springboot.yml'
  pull_request:
    paths:
      - 'implementations/java-springboot/**'
      - '.github/workflows/java-springboot.yml'

jobs:
  java-springboot:
    runs-on: ubuntu-latest
    # ./gradlew build는 Testcontainers 기반 E2E 테스트를 포함해 실행 시간이 길다.
    # 리소스가 제한된 로컬 sandbox에서는 timeout을 겪은 적이 있지만, GitHub-hosted
    # ubuntu-latest는 Docker가 기본 탑재되어 있고 리소스도 더 넉넉하므로 일단 하나의
    # 스텝으로 전체 빌드를 시도한다. 지속적으로 타임아웃되면 test/e2eTest 태스크를
    # 분리해 각각 timeout-minutes를 늘리는 방향으로 전환한다.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: implementations/java-springboot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # spotlessCheck는 build/check가 자동으로 포함하지만, Testcontainers e2e까지 기다리지
      # 않고 포맷 위반을 먼저 빠르게 보고하기 위해 별도 스텝으로 분리한다.
      - name: Lint (Spotless)
        run: ./gradlew spotlessCheck
        working-directory: implementations/java-springboot/examples

      - name: Build (unit + Testcontainers e2e)
        run: ./gradlew build
        working-directory: implementations/java-springboot/examples

      - name: Harness self-tests (규칙별 fixture 회귀 테스트)
        working-directory: implementations/java-springboot/harness
        run: |
          javac -d build/classes $(find src -name "*.java")
          javac -cp build/classes -d build/test-classes test/RuleTest.java
          cd test && java -cp ../build/classes:../build/test-classes RuleTest

      - name: Run harness
        run: bash harness.sh examples
