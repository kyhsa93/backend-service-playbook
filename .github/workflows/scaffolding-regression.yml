name: Scaffolding generator regression

# Verifies that each language's create-domain generator produces a real harness 100/100
# (0 FAIL) for an unfamiliar domain name — until now this was verified by running it
# manually. The runner's checkout is discarded once the job ends, so this generates
# directly on top of the real checkout with no separate scratch copy needed.

on:
  push:
    paths:
      - 'implementations/*/scripts/**'
      - 'implementations/*/harness/**'
      - 'implementations/*/docs/reference.md'
      - '.github/workflows/scaffolding-regression.yml'
  pull_request:
    paths:
      - 'implementations/*/scripts/**'
      - 'implementations/*/harness/**'
      - 'implementations/*/docs/reference.md'
      - '.github/workflows/scaffolding-regression.yml'
  workflow_dispatch:

jobs:
  nestjs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/nestjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: node scripts/create-domain.js ScaffoldCheck --wire
      - run: npm ci
        working-directory: implementations/nestjs/examples
      - run: bash harness.sh examples

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version-file: implementations/go/examples/go.mod
      # scripts/create-domain is an independent Go module, same as examples/harness, so it
      # must be run from inside that directory (see implementations/go/CLAUDE.md).
      - run: go run . ScaffoldCheck --wire
        working-directory: implementations/go/scripts/create-domain
      - run: bash harness.sh examples

  java-springboot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/java-springboot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - run: python3 scripts/create_domain.py ScaffoldCheck
      - run: bash harness.sh examples

  kotlin-springboot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/kotlin-springboot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - run: python3 scripts/create_domain.py ScaffoldCheck --project-root examples --wire
      - name: Install kotlinc
        run: |
          curl -fsSL -o /tmp/kotlin-compiler.zip \
            https://github.com/JetBrains/kotlin/releases/download/v2.0.20/kotlin-compiler-2.0.20.zip
          unzip -q /tmp/kotlin-compiler.zip -d /tmp
          echo "/tmp/kotlinc/bin" >> "$GITHUB_PATH"
      - run: bash harness.sh examples

  fastapi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/fastapi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: pip install -r examples/requirements.txt
      - run: python3 scripts/create_domain.py ScaffoldCheck --wire
      - run: bash harness.sh examples
