name: Close stale issues and PRs

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          stale-issue-message: >
            This issue has been marked stale due to 60 days of inactivity. It will be
            closed automatically if there is no further activity within 14 days.
          stale-pr-message: >
            This PR has been marked stale due to 60 days of inactivity. It will be
            closed automatically if there is no further activity within 14 days.
          # Dependabot PRs are exempt since they can look inactive while just waiting on CI results.
          exempt-pr-labels: 'dependencies'
