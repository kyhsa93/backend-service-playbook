name: Close stale issues and PRs

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          stale-issue-message: >
            이 이슈는 60일 동안 활동이 없어 stale로 표시되었습니다. 14일 내에 추가 활동이
            없으면 자동으로 닫힙니다.
          stale-pr-message: >
            이 PR은 60일 동안 활동이 없어 stale로 표시되었습니다. 14일 내에 추가 활동이
            없으면 자동으로 닫힙니다.
          # Dependabot PR은 CI 결과를 기다리는 동안 활동이 없어 보일 수 있어 제외한다.
          exempt-pr-labels: 'dependencies'
