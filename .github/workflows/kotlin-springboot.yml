name: kotlin-springboot

on:
  push:
    branches: [main]
    paths:
      - 'implementations/kotlin-springboot/**'
      - '.github/workflows/kotlin-springboot.yml'
  pull_request:
    paths:
      - 'implementations/kotlin-springboot/**'
      - '.github/workflows/kotlin-springboot.yml'

jobs:
  kotlin-springboot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/kotlin-springboot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Testcontainers 기반 e2e 테스트 포함 — ubuntu-latest는 Docker가 기본 탑재되어 있어 그대로 동작한다.
      - run: ./gradlew build
        working-directory: implementations/kotlin-springboot/examples

      # harness가 Kotlin 프로그램으로 재작성됨(issue #46) — kotlinc가 PATH에 없으면 다운로드해 준비한다.
      - name: Install kotlinc
        run: |
          curl -fsSL -o /tmp/kotlin-compiler.zip \
            https://github.com/JetBrains/kotlin/releases/download/v2.0.20/kotlin-compiler-2.0.20.zip
          unzip -q /tmp/kotlin-compiler.zip -d /tmp
          echo "/tmp/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Harness self-tests (규칙별 fixture 회귀 테스트)
        working-directory: implementations/kotlin-springboot/harness
        run: |
          kotlinc src test/RuleTest.kt -include-runtime -d build/test.jar
          cd test && java -cp ../build/test.jar harness.test.RuleTestKt

      - run: bash harness.sh examples
