name: kotlin-springboot

on:
  push:
    branches: [main]
    paths:
      - 'implementations/kotlin-springboot/**'
      - '.github/workflows/kotlin-springboot.yml'
  pull_request:
    paths:
      - 'implementations/kotlin-springboot/**'
      - '.github/workflows/kotlin-springboot.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  kotlin-springboot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/kotlin-springboot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # ktlint — fail fast on style violations here rather than waiting for the
      # Testcontainers e2e tests, which take over 4 minutes. ktlintCheck is already wired
      # into the check/build tasks via build.gradle.kts's plugin config, so the
      # `./gradlew build` below verifies it again anyway, but pulling it into its own step
      # makes the failure cause immediately distinguishable in the log.
      - name: Lint (ktlint)
        run: ./gradlew ktlintCheck
        working-directory: implementations/kotlin-springboot/examples

      # Includes Testcontainers-based e2e tests — works as-is since ubuntu-latest ships Docker by default.
      - run: ./gradlew build
        working-directory: implementations/kotlin-springboot/examples

      # The harness is a Kotlin program — download and set up kotlinc since it isn't on PATH.
      - name: Install kotlinc
        run: |
          curl -fsSL -o /tmp/kotlin-compiler.zip \
            https://github.com/JetBrains/kotlin/releases/download/v2.0.20/kotlin-compiler-2.0.20.zip
          unzip -q /tmp/kotlin-compiler.zip -d /tmp
          echo "/tmp/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Harness self-tests (per-rule fixture regression tests)
        working-directory: implementations/kotlin-springboot/harness
        run: |
          kotlinc src test/RuleTest.kt -include-runtime -d build/test.jar
          cd test && java -cp ../build/test.jar harness.test.RuleTestKt

      - name: Harness
        run: bash harness.sh examples | tee /tmp/harness-output.txt

      - name: Format harness score comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          { echo '### kotlin-springboot harness'; echo; echo '```'; cat /tmp/harness-output.txt; echo '```'; } > /tmp/harness-comment.md

      - name: Comment harness score on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        with:
          header: harness-kotlin-springboot
          path: /tmp/harness-comment.md
