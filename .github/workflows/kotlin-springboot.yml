name: kotlin-springboot

on:
  push:
    branches: [main]
    paths:
      - 'implementations/kotlin-springboot/**'
      - '.github/workflows/kotlin-springboot.yml'
  pull_request:
    paths:
      - 'implementations/kotlin-springboot/**'
      - '.github/workflows/kotlin-springboot.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  kotlin-springboot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/kotlin-springboot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # ktlint — 스타일 위반은 여기서 빨리 실패시키고, 4분 넘게 걸리는
      # Testcontainers e2e 테스트까지 기다리지 않게 한다. ktlintCheck는 build.gradle.kts의
      # 플러그인 설정으로 check/build 태스크에도 이미 연결되어 있어 아래 `./gradlew build`가
      # 다시 한 번 검증하지만, 별도 스텝으로 뽑아두면 실패 원인이 로그에서 바로 구분된다.
      - name: Lint (ktlint)
        run: ./gradlew ktlintCheck
        working-directory: implementations/kotlin-springboot/examples

      # Testcontainers 기반 e2e 테스트 포함 — ubuntu-latest는 Docker가 기본 탑재되어 있어 그대로 동작한다.
      - run: ./gradlew build
        working-directory: implementations/kotlin-springboot/examples

      # harness는 Kotlin 프로그램이다 — kotlinc가 PATH에 없으면 다운로드해 준비한다.
      - name: Install kotlinc
        run: |
          curl -fsSL -o /tmp/kotlin-compiler.zip \
            https://github.com/JetBrains/kotlin/releases/download/v2.0.20/kotlin-compiler-2.0.20.zip
          unzip -q /tmp/kotlin-compiler.zip -d /tmp
          echo "/tmp/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Harness self-tests (규칙별 fixture 회귀 테스트)
        working-directory: implementations/kotlin-springboot/harness
        run: |
          kotlinc src test/RuleTest.kt -include-runtime -d build/test.jar
          cd test && java -cp ../build/test.jar harness.test.RuleTestKt

      - name: Harness
        run: bash harness.sh examples | tee /tmp/harness-output.txt

      - name: Format harness score comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          { echo '### kotlin-springboot harness'; echo; echo '```'; cat /tmp/harness-output.txt; echo '```'; } > /tmp/harness-comment.md

      - name: Comment harness score on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: harness-kotlin-springboot
          path: /tmp/harness-comment.md
