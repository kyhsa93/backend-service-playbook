name: nestjs

on:
  push:
    branches: [main]
    paths:
      - 'implementations/nestjs/**'
      - '.github/workflows/nestjs.yml'
  pull_request:
    paths:
      - 'implementations/nestjs/**'
      - '.github/workflows/nestjs.yml'

jobs:
  nestjs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/nestjs/examples
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run test:e2e
      - run: cd ../harness && npm ci && npm run lint && npm run test:evaluators && npm run evaluate -- ../examples
