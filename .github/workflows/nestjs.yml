name: nestjs

on:
  push:
    branches: [main]
    paths:
      - 'implementations/nestjs/**'
      - '.github/workflows/nestjs.yml'
  pull_request:
    paths:
      - 'implementations/nestjs/**'
      - '.github/workflows/nestjs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  nestjs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/nestjs/examples
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run test:e2e
      - run: cd ../harness && npm ci && npm run lint && npm run test:evaluators
      - name: Harness
        run: cd ../harness && npm run evaluate -- ../examples | tee /tmp/harness-output.txt

      - name: Format harness score comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          { echo '### nestjs harness'; echo; echo '```'; cat /tmp/harness-output.txt; echo '```'; } > /tmp/harness-comment.md

      - name: Comment harness score on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        with:
          header: harness-nestjs
          path: /tmp/harness-comment.md
