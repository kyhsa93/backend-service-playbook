name: Dependabot auto-merge

on:
  pull_request_target:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Major version upgrades can be breaking changes, so a human reviews those directly —
      # only patch/minor are auto-approved and merged. This repo doesn't enforce branch
      # protection/required checks on main, so instead of relying solely on
      # `gh pr merge --auto`, this waits for the actual check-run results and merges only
      # once they succeed.
      - name: Wait for checks, then approve and merge
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: |
          gh pr checks "$PR_URL" --watch --fail-fast
          gh pr review --approve "$PR_URL"
          gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
