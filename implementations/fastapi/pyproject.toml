[tool.ruff]
# The many comments/error messages cause a 100-character limit to produce a large number
# of line-wrap diffs unrelated to the actual change. Relaxed to 120 to catch only genuinely long lines.
line-length = 120
target-version = "py312"
exclude = [
  "harness/tests/fixtures",
]

[tool.ruff.lint]
# The default rule set (E4/E7/E9/F) plus explicitly adding all of pycodestyle (E)/isort (I).
# `ALL` is not adopted, since it's overly strict and causes large, unrelated diffs.
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
known-first-party = ["src"]
