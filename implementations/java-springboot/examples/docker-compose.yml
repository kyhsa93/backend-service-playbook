services:
  database:
    image: postgres:16-alpine
    ports: ['5432:5432']
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    volumes: ['db-data:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d app']
      interval: 5s
      timeout: 3s
      retries: 5

  localstack:
    image: localstack/localstack:3.0
    ports: ['4566:4566']
    environment:
      SERVICES: ses,secretsmanager,sqs
      DEFAULT_REGION: us-east-1
    volumes: ['./localstack:/etc/localstack/init/ready.d']
    healthcheck:
      test: ['CMD-SHELL', 'awslocal ses list-identities']
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports: ['11434:11434']
    volumes: ['ollama-data:/root/.ollama']
    healthcheck:
      test: ['CMD-SHELL', 'ollama list || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10

  # A one-shot init container — pulls the classifier model into the shared ollama-data volume
  # once, then exits. `app` depends on it completing (service_completed_successfully), the same
  # role LocalStack's init/ready.d scripts play for AWS resources.
  ollama-init:
    image: ollama/ollama:latest
    entrypoint: ['/bin/sh', '-c']
    command: ['ollama pull qwen2.5:1.5b']
    environment:
      OLLAMA_HOST: ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  # Optional — only needed when FRAUD_SCORER_MODE=http (default is 'native', which needs no extra
  # service). Not in `app`'s depends_on since it lives under a separate profile: bring it up
  # alongside `app` with `docker compose --profile app --profile ml up`. See
  # config/FraudScorerProperties.java and services/fraud-risk-scorer/README.md.
  fraud-risk-scorer:
    build: ../../../services/fraud-risk-scorer
    ports: ['8000:8000']
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles:
      - ml

  app:
    build: .
    ports: ['8080:8080']
    env_file:
      - .env.development
    environment:
      # Inside the container network, connect via the service name instead of localhost.
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/app
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_DOMAIN_EVENT_QUEUE_URL: http://localstack:4566/000000000000/domain-events
      SQS_TASK_QUEUE_URL: http://localstack:4566/000000000000/task-queue.fifo
      OLLAMA_BASE_URL: http://ollama:11434
      FRAUD_SCORER_BASE_URL: http://fraud-risk-scorer:8000
    depends_on:
      database:
        condition: service_healthy
      localstack:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    profiles:
      - app

volumes:
  db-data:
  ollama-data:
