spring:
  application:
    name: account-service
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: account-service
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: W3C
  otlp:
    tracing:
      # No collector needs to be running locally/in tests — spans are exported on a background
      # thread by the OTel SDK's batch span processor, so an unreachable endpoint only logs an
      # export warning, it never fails a request or a test.
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

aws:
  region: ${AWS_REGION:us-east-1}
  endpoint-url: ${AWS_ENDPOINT_URL:}
  access-key-id: ${AWS_ACCESS_KEY_ID:test}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:test}

ses:
  sender-email: ${SES_SENDER_EMAIL:no-reply@backend-service-playbook.example.com}

sqs:
  domain-event-queue-url: ${SQS_DOMAIN_EVENT_QUEUE_URL:http://localhost:4566/000000000000/domain-events}
  task-queue-url: ${SQS_TASK_QUEUE_URL:http://localhost:4566/000000000000/task-queue.fifo}

jwt:
  secret: ${JWT_SECRET:dev-secret-dev-secret-dev-secret}

# Refund reason classification (see payment/infrastructure/RefundReasonClassifierImpl.java) —
# served locally by Ollama (docker-compose.yml). No API key: it's a self-hosted open-source model.
refund-classifier:
  ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${REFUND_CLASSIFIER_MODEL:qwen2.5:1.5b}

# Refund fraud-risk scoring (see payment/application/service/RefundFraudRiskScorer.java) — 'native'
# (default) trains a small model in-process at startup, no extra service needed. Set to 'http' to
# call the shared services/fraud-risk-scorer microservice (docker-compose.yml) instead.
fraud-scorer:
  mode: ${FRAUD_SCORER_MODE:native}
  base-url: ${FRAUD_SCORER_BASE_URL:http://localhost:8000}

resilience4j:
  ratelimiter:
    instances:
      createAccount:
        limit-for-period: 5
        limit-refresh-period: 1m
        timeout-duration: 0
      http-write:
        limit-for-period: 10
        limit-refresh-period: 60s
        timeout-duration: 0s
      http-read:
        limit-for-period: 100
        limit-refresh-period: 60s
        timeout-duration: 0s
