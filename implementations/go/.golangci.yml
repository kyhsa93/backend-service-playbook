version: "2"

run:
  timeout: 5m

linters:
  # Adds only clearly useful linters on top of the default-enabled set
  # (errcheck, govet, ineffassign, staticcheck, unused). Exhaustive/strict
  # rule sets are not included.
  default: standard
  enable:
    - unconvert

formatters:
  enable:
    - gofmt
